<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulator Control Panel</title>
  <style>
    :root { --output-panel-width: 420px; }
    body { font-family: Arial, sans-serif; margin: 20px; background: #fafafa; margin-right: calc(var(--output-panel-width) + 36px); }
    h1 { margin-bottom: 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      width: 360px;
      min-width: 360px;
      max-width: 360px;
      box-sizing: border-box;
    }
    .card h2 { margin: 0 0 10px; font-size: 18px; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    button { padding: 8px 12px; border-radius: 6px; border: 1px solid #999; background: #f4f4f4; cursor: pointer; }
    button:hover { background: #e9e9e9; }
    select, input { padding: 8px; border: 1px solid #bbb; border-radius: 6px; width: 100%; margin: 6px 0; box-sizing: border-box; }
    pre { background: #f6f8fb; color: #1f2937; padding: 12px; border-radius: 8px; max-height: 360px; overflow: auto; border: 1px solid #dbe2ea; }
    .wave-wrap { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-top: 12px; }
    #waveCanvas { width: 100%; height: 520px; border: 1px solid #bbb; background: #ffffff; border-radius: 6px; display: block; }
    .muted { color: #666; font-size: 13px; }
    #outputPanel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: var(--output-panel-width);
      height: calc(100vh - 32px);
      background: #ffffff;
      border: 1px solid #d0dae5;
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }
    #outputResizer {
      position: absolute;
      left: -4px;
      top: 0;
      width: 8px;
      height: 100%;
      cursor: col-resize;
      border-radius: 8px;
    }
    #outputResizer:hover { background: rgba(37, 99, 235, 0.12); }
    body.resizing { cursor: col-resize; user-select: none; }
    #outputPanel h2 { margin: 0; font-size: 18px; }
    #output { flex: 1; max-height: none; margin: 0; white-space: pre-wrap; }
    .track-picker-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .track-picker-row select { margin: 0; flex: 1; }
    .track-selected { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .track-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
    }
    .track-chip button {
      padding: 0;
      border: none;
      background: transparent;
      color: #3730a3;
      font-size: 12px;
      cursor: pointer;
    }
    .quick-path { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #d6deea; }
    .quick-path code { word-break: break-all; }
  </style>
</head>
<body>
  <aside id="outputPanel">
    <div id="outputResizer" title="拖拽调整宽度"></div>
    <h2>执行结果</h2>
    <pre id="output">等待操作...</pre>
  </aside>

  <h1>模拟器运行程序控制台</h1>
  

  <div class="row">
    <div class="card">
      <h2>Connection</h2>
      <label>API Base URL（VM 后端地址）</label>
      <input id="apiBase" type="text" placeholder="如 http://100.x.x.x:5000 或留空使用同源" />
      <div class="btns">
        <button onclick="saveApiBase()">保存连接配置</button>
      </div>
      <p class="muted">HTML 放在 Windows 时，请填 VM 地址；同源部署可留空。</p>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h2>Build</h2>
      <p class="muted">对应 README: <code>make</code></p>
      <div class="btns">
        <button onclick="runAction('build','make')">make</button>
        <button onclick="runAction('build','clean')">make clean</button>
      </div>
    </div>

    <div class="card">
      <h2>Compile</h2>
      <label>tests/ 文件</label>
      <select id="testsFile"></select>
      <div class="btns">
        <button onclick="runAction('compile','c')">c</button>
        <button onclick="runAction('compile','asm')">asm</button>
        <button onclick="runAction('compile','dump')">dump</button>
      </div>
    </div>

    <div class="card">
      <h2>运行程序</h2>
      <p class="muted">对应 README: <code>./build/test ...</code> 与 <code>./build/waveform ...</code></p>
      <label>out/ 文件夹中的二进制文件</label>
      <select id="outFile"></select>
      <label>log steps</label>
      <input id="logSteps" type="number" value="2000" min="1" />
      <p class="muted">控制写入日志文件的最大步数，只影响日志大小。</p>
      <label>max steps (0=默认)</label>
      <input id="maxSteps" type="number" value="0" min="0" />
      <p class="muted">CPU 最多运行多少步；0 表示用程序默认上限。</p>
      <label>map 名称（用于从CAD格式json中绘制地图，留空表示不需要生成地图）</label>
      <input id="mapName" type="text" placeholder="如 maploader_sample" />
      <label>log/ 文件（日志文件名，如果不指定，默认与程序名称一致）</label>
      <input id="runLogFile" type="text" list="runLogFileList" placeholder="如 -2.txt" />
      <datalist id="runLogFileList"></datalist>
      <div class="btns">
        <button onclick="runAction('simulate','run')">运行</button>
        
      </div>
    </div>

    <div class="card">
      <h2>绘制波形图</h2>
      <label>log/ 文件夹中的日志文件</label>
      <input id="logFile" type="text" list="logFileList" placeholder="如 -2.txt" />
      <datalist id="logFileList"></datalist>
      <label>max wave steps</label>
      <input id="waveSteps" type="number" value="2000" min="1" />
      <p class="muted">转波形时读取日志的步数上限。</p>
      <label>输出文件名（写入 plot/文件夹）</label>
      <input id="waveOutput" type="text" value="wave.json" />
      <div class="btns">
        <button onclick="runAction('waveform','build')">生成波形图json文件</button>
        <button onclick="openWave()">打开波形图json文件</button>
      </div>
      <hr style="border: none; border-top: 1px dashed #d6deea; margin: 12px 0;" />
      <h2>波形图可视化（分页）</h2>
      <label>波形 JSON 文件（plot/ 下）</label>
      <input id="waveJsonFile" type="text" value="wave.json" />
      <label>每页步数</label>
      <input id="pageSize" type="number" value="20" min="1" />
      <label>可显示变量（从 JSON tracks 中选择）</label>
      <div class="track-picker-row">
        <select id="trackPicker"></select>
        <button type="button" onclick="addSelectedTrack()">添加</button>
        <button type="button" onclick="resetPreferredTracks()">默认</button>
        <button type="button" onclick="clearTrackSelection()">清空</button>
      </div>
      <div id="selectedTracks" class="track-selected"></div>
      <div class="btns">
        <button onclick="loadWave()">加载波形</button>
        <button onclick="prevPage()">上一页</button>
        <button onclick="nextPage()">下一页</button>
      </div>
      <p id="wavePageInfo" class="muted">未加载</p>
    </div>
  </div>

  <div class="wave-wrap">
    <h2>波形图显示</h2>
    <canvas id="waveCanvas" style="width: 100%; height: auto; background: #fff; border: 1px solid #bbb; border-radius: 6px;"></canvas>
  </div>

  <div class="row">
    <button onclick="refreshFiles()">刷新文件列表</button>
  </div>

  <script>
    let waveData = null;
    let currentPage = 0;
    let selectedTrackNames = [];

    function currentApiBase() {
      return (localStorage.getItem('SIM_API_BASE') || '').trim().replace(/\/+$/, '');
    }

    function apiUrl(path) {
      const base = currentApiBase();
      return base ? (base + path) : path;
    }

    function saveApiBase() {
      const v = (document.getElementById('apiBase').value || '').trim();
      localStorage.setItem('SIM_API_BASE', v);
      document.getElementById('output').textContent = '已保存 API Base: ' + (v || '(same-origin)');
      refreshFiles();
    }

    async function refreshFiles() {
      const res = await fetch(apiUrl('/api/files'));
      const data = await res.json();
      fillSelect('testsFile', data.tests || []);
      fillSelect('outFile', data.out || []);
      fillDatalistInput('logFile', 'logFileList', data.log || []);
      fillDatalistInput('runLogFile', 'runLogFileList', data.log || []);
    }

    function fillSelect(id, items) {
      const sel = document.getElementById(id);
      const prev = sel.value;
      sel.innerHTML = '';
      for (const item of items) {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        sel.appendChild(opt);
      }
      if (prev && items.includes(prev)) sel.value = prev;
    }

    function fillDatalistInput(inputId, listId, items) {
      const input = document.getElementById(inputId);
      const list = document.getElementById(listId);
      list.innerHTML = '';
      for (const item of items) {
        const opt = document.createElement('option');
        opt.value = item;
        list.appendChild(opt);
      }
    }

    function printResult(data) {
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    async function runAction(category, action) {
      const payload = { category, action };
      if (category === 'compile') {
        payload.file = document.getElementById('testsFile').value;
      } else if (category === 'simulate') {
        payload.file = document.getElementById('outFile').value;
        payload.log_steps = Number(document.getElementById('logSteps').value || 2000);
        payload.max_steps = Number(document.getElementById('maxSteps').value || 0);
        payload.map = document.getElementById('mapName').value.trim();
        payload.log_file = document.getElementById('runLogFile').value;
      } else if (category === 'waveform') {
        payload.file = document.getElementById('logFile').value;
        payload.max_wave_steps = Number(document.getElementById('waveSteps').value || 2000);
        payload.output = document.getElementById('waveOutput').value.trim() || 'wave.json';
      }

      const res = await fetch(apiUrl('/api/action'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      printResult(data);
      if (category === 'simulate' && action === 'run_and_wave') {
        
      } else if (category === 'waveform' && action === 'build') {
        const waveName = payload.output || 'wave.json';
        document.getElementById('waveJsonFile').value = waveName;
      }
      await refreshFiles();
    }

    function openWave() {
      const name = (document.getElementById('waveOutput').value || 'wave.json').trim();
      window.open(apiUrl('/plot/' + encodeURIComponent(name)), '_blank');
    }

    function drawText(ctx, text, x, y, color = '#1f2937') {
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
    }

    function prepareCanvasForDraw(trackCount, pageSize) {
      const canvas = document.getElementById('waveCanvas');
      const dpr = window.devicePixelRatio || 1;
      const cssWidth = Math.max(900, Math.floor(canvas.clientWidth || 900));
      const cssHeight = Math.max(360, 80 + Math.max(1, trackCount) * 50);
      canvas.style.height = `${cssHeight}px`;
      canvas.width = Math.floor(cssWidth * dpr);
      canvas.height = Math.floor(cssHeight * dpr);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, cssWidth, cssHeight);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, cssWidth, cssHeight);
      ctx.font = '12px Arial';
      return { ctx, cssWidth, cssHeight };
    }

    function getStepValue(samples, step) {
      let value = '-';
      for (const s of samples) {
        if (Number(s.step) <= step) {
          value = s.value;
        } else {
          break;
        }
      }
      return value;
    }

    function getDisplayTracks(allTracks) {
      const map = new Map((allTracks || []).map(t => [t.name, t]));
      if (selectedTrackNames.length > 0) {
        return selectedTrackNames
          .filter(name => map.has(name))
          .map(name => map.get(name));
      }
      const preferred = ['pc_if', 'pc_id', 'opcode', 'wb_reg', 'wb_val', 'mem_rw', 'mem_addr', 'control'];
      const selected = [];
      for (const name of preferred) {
        if (map.has(name)) selected.push(map.get(name));
      }
      if (selected.length > 0) return selected;
      return (allTracks || []).slice(0, 8);
    }

    function getTotalStepCount() {
      const fromMeta = Number(waveData?.meta?.step_count || 0);
      if (fromMeta > 0) return fromMeta;
      const steps = Array.isArray(waveData?.steps) ? waveData.steps : [];
      if (steps.length === 0) return 0;
      const maxStep = Math.max(...steps.map(s => Number(s.step || 0)));
      return maxStep + 1;
    }

    function isNumericLike(v) {
      return typeof v === 'string' && (/^0x[0-9a-f]+$/i.test(v) || /^-?\d+$/.test(v));
    }

    function valueToLevel(v) {
      if (v === '-' || v === '' || v == null) return 1;
      if (/^0x0+$/i.test(v) || v === '0') return 0;
      return 2;
    }

    function isBusTrack(trackName) {
      return trackName.startsWith('pc_') ||
        trackName === 'opcode' ||
        trackName === 'wb_reg' ||
        trackName === 'wb_val' ||
        trackName === 'mem_addr' ||
        trackName === 'mem_rw' ||
        trackName === 'control' ||
        trackName === 'ex_result';
    }

    function getTrackColor(trackName, value, numericMode) {
      if (trackName === 'control') {
        const t = String(value || '');
        if (t.includes('FLUSH')) return '#dc2626';
        if (t.includes('STALL') || t.includes('hazard')) return '#d97706';
        if (t.includes('FWD')) return '#0284c7';
        return '#6b7280';
      }
      if (trackName === 'mem_rw') {
        return String(value) === 'store' ? '#7c3aed' : '#0891b2';
      }
      if (trackName === 'opcode') return '#16a34a';
      if (trackName.startsWith('pc_')) return '#0ea5e9';
      if (trackName.startsWith('wb_')) return '#f59e0b';
      if (trackName.startsWith('mem_')) return '#8b5cf6';
      if (!numericMode) return '#475569';
      return '#2563eb';
    }

    function updateTrackPicker() {
      const picker = document.getElementById('trackPicker');
      picker.innerHTML = '';
      const tracks = Array.isArray(waveData?.tracks) ? waveData.tracks : [];
      for (const t of tracks) {
        const opt = document.createElement('option');
        opt.value = t.name;
        opt.textContent = t.name;
        picker.appendChild(opt);
      }
      renderSelectedTracks();
    }

    function renderSelectedTracks() {
      const wrap = document.getElementById('selectedTracks');
      wrap.innerHTML = '';
      if (selectedTrackNames.length === 0) {
        wrap.textContent = '当前使用默认变量集';
        wrap.classList.add('muted');
        return;
      }
      wrap.classList.remove('muted');
      for (const name of selectedTrackNames) {
        const chip = document.createElement('span');
        chip.className = 'track-chip';
        chip.textContent = name;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = 'x';
        btn.title = '移除';
        btn.onclick = () => {
          selectedTrackNames = selectedTrackNames.filter(n => n !== name);
          renderSelectedTracks();
          renderWavePage();
        };
        chip.appendChild(btn);
        wrap.appendChild(chip);
      }
    }

    function addSelectedTrack() {
      const name = document.getElementById('trackPicker').value;
      if (!name) return;
      if (!selectedTrackNames.includes(name)) {
        selectedTrackNames.push(name);
      }
      renderSelectedTracks();
      renderWavePage();
    }

    function clearTrackSelection() {
      selectedTrackNames = [];
      renderSelectedTracks();
      renderWavePage();
    }

    function resetPreferredTracks() {
      const preferred = ['pc_if', 'pc_id', 'opcode', 'wb_reg', 'wb_val', 'mem_rw', 'mem_addr', 'control'];
      const available = new Set((waveData?.tracks || []).map(t => t.name));
      selectedTrackNames = preferred.filter(name => available.has(name));
      renderSelectedTracks();
      renderWavePage();
    }

    async function copyLogSignalPath() {
      const text = document.getElementById('logSignalPath').textContent.trim();
      try {
        await navigator.clipboard.writeText(text);
        document.getElementById('output').textContent = `已复制路径: ${text}\n字段清单宏：PIPE_*_LOG_FIELDS；日志开关：include/utils/utils.hpp 里的 SimLogConfig::log_pipe_signals`;
      } catch (_) {
        document.getElementById('output').textContent = `复制失败，请手动复制: ${text}`;
      }
    }

    function renderWavePage() {
      const canvas = document.getElementById('waveCanvas');
      const pageSize = Math.max(1, Number(document.getElementById('pageSize').value || 20));

      if (!waveData || !Array.isArray(waveData.tracks)) {
        const prepared = prepareCanvasForDraw(1, pageSize);
        const ctx = prepared.ctx;
        drawText(ctx, '请先加载 wave.json', 20, 30);
        return;
      }
      const tracks = getDisplayTracks(waveData.tracks).slice(0, 8);
      const prepared = prepareCanvasForDraw(tracks.length, pageSize);
      const ctx = prepared.ctx;
      const canvasWidth = prepared.cssWidth;
      const canvasHeight = prepared.cssHeight;
      if (waveData.tracks.length === 0) {
        drawText(ctx, '已加载，但 tracks 为空（通常表示 log 中没有可解析波形）', 20, 30);
      }

      const startStep = currentPage * pageSize;
      const endStep = startStep + pageSize - 1;

      const left = 120;
      const top = 50;
      const rowH = 50;
      const stepW = Math.max(20, Math.floor((canvasWidth - left - 20) / pageSize));

      // vertical step grid
      ctx.strokeStyle = '#d9e1eb';
      ctx.lineWidth = 1;
      for (let i = 0; i <= pageSize; i += 1) {
        const x = left + i * stepW;
        ctx.beginPath();
        ctx.moveTo(x, top - 20);
        ctx.lineTo(x, top + tracks.length * rowH);
        ctx.stroke();
      }

      for (let i = 0; i <= pageSize; i += 5) {
        const step = startStep + i;
        drawText(ctx, String(step), left + i * stepW + 2, top - 25, '#64748b');
      }

      tracks.forEach((track, idx) => {
        const baseY = top + idx * rowH;
        drawText(ctx, track.name || `track${idx}`, 10, baseY + 18, '#0f172a');
        const trackName = track.name || '';

        let prevY = null;
        let prevX = null;
        let prevV = null;
        let lastLabelX = -9999;
        for (let s = startStep; s <= endStep; s += 1) {
          const v = getStepValue(track.samples || [], s);
          const numericMode = isNumericLike(v);
          const busMode = isBusTrack(trackName);
          const level = valueToLevel(v); // 0=low 1=mid(unknown) 2=high
          const y = (numericMode && !busMode) ? (baseY + (level === 2 ? 8 : (level === 1 ? 20 : 32))) : (baseY + 20);
          const x = left + (s - startStep) * stepW;
          const color = getTrackColor(trackName, v, numericMode);

          if (prevX !== null) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(prevX, prevY);
            ctx.lineTo(x, prevY);
            ctx.lineTo(x, y);
            ctx.stroke();
          }
          if ((busMode || !numericMode) && v !== prevV && v !== '-' && v !== '' && (x - lastLabelX) >= 48) {
            drawText(ctx, String(v), x + 2, baseY + 35, color);
            lastLabelX = x;
          }
          prevX = x;
          prevY = y;
          prevV = v;
        }
      });

      const totalSteps = getTotalStepCount();
      const maxPages = Math.max(1, Math.ceil(totalSteps / pageSize));
      document.getElementById('wavePageInfo').textContent =
        `第 ${currentPage + 1}/${maxPages} 页，step ${startStep}-${endStep}（总步数约 ${totalSteps}）`;
    }

    async function loadWave() {
      const name = (document.getElementById('waveJsonFile').value || 'wave.json').trim();
      const res = await fetch(apiUrl('/plot/' + encodeURIComponent(name)));
      if (!res.ok) {
        document.getElementById('wavePageInfo').textContent = `加载失败: ${res.status} (${name})`;
        return;
      }
      waveData = await res.json();
      currentPage = 0;
      updateTrackPicker();
      resetPreferredTracks();
      renderWavePage();
    }

    function prevPage() {
      if (!waveData) return;
      currentPage = Math.max(0, currentPage - 1);
      renderWavePage();
    }

    function nextPage() {
      if (!waveData) return;
      const pageSize = Math.max(1, Number(document.getElementById('pageSize').value || 20));
      const maxPages = Math.max(1, Math.ceil(getTotalStepCount() / pageSize));
      currentPage = Math.min(maxPages - 1, currentPage + 1);
      renderWavePage();
    }

    function updateOutputPanelWidth(v) {
      const px = Math.max(300, Math.min(900, Number(v || 420)));
      document.documentElement.style.setProperty('--output-panel-width', `${px}px`);
      localStorage.setItem('SIM_OUTPUT_PANEL_WIDTH', String(px));
    }

    function initOutputPanelResize() {
      const resizer = document.getElementById('outputResizer');
      if (!resizer) return;
      let resizing = false;
      const onMove = (e) => {
        if (!resizing) return;
        const newWidth = Math.max(300, Math.min(900, window.innerWidth - e.clientX - 16));
        updateOutputPanelWidth(newWidth);
      };
      const stopResize = () => {
        if (!resizing) return;
        resizing = false;
        document.body.classList.remove('resizing');
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', stopResize);
      };
      resizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        resizing = true;
        document.body.classList.add('resizing');
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', stopResize);
      });
    }

    document.getElementById('apiBase').value = localStorage.getItem('SIM_API_BASE') || '';
    const savedWidth = Number(localStorage.getItem('SIM_OUTPUT_PANEL_WIDTH') || 420);
    updateOutputPanelWidth(savedWidth);
    initOutputPanelResize();
    renderSelectedTracks();
    refreshFiles();
    renderWavePage();
  </script>
</body>
</html>
